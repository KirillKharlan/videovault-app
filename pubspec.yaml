name: videovault
description: Offline video gallery with YouTube/TikTok/Instagram downloader
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  http: ^1.2.1
  dio: ^5.4.3                      # для скачивания с прогрессом

  # Локальная база данных
  sqflite: ^2.3.3
  path: ^1.9.0

  # Видеоплеер
  video_player: ^2.8.6
  chewie: ^1.8.1                   # красивый UI поверх video_player

  # Хранение файлов
  path_provider: ^2.1.3
  permission_handler: ^11.3.1

  # UI
  cached_network_image: ^3.3.1     # кэш для превью
  share_plus: ^9.0.0               # share intent (принимать ссылки)
  share_handler: ^0.0.25
  # receive_sharing_intent: ^1.8.0   # получать shared URL из YouTube/TikTok
  flutter_local_notifications: ^17.1.2  # уведомления о загрузке

  # Утилиты
  timeago: ^3.6.1
  intl: ^0.19.0
  receive_sharing_intent: ^1.9.0

  # Импорт видео из галереи телефона
  image_picker: ^1.1.2
  video_thumbnail: ^0.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
